<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: #16213e;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .subtitle a { color: #e94560; text-decoration: none; }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #aaa;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f3460;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #e94560; }
        button {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #c73650; }
        .result {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            display: none;
        }
        .success { background: #1b5e20; display: block; }
        .error { background: #b71c1c; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>로그인 테스트</h1>
        <p class="subtitle">연결 대상: <a href="https://example2606242.onrender.com/login/" target="_blank">/login/</a></p>

        <label>사용자 아이디 (USERID)</label>
        <input type="text" id="userid" placeholder="아이디 입력">

        <label>비밀번호 (PASSWORD)</label>
        <input type="password" id="password" placeholder="비밀번호 입력">

        <button onclick="doLogin()">로그인 시도 →</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        async function doLogin() {
            const userid = document.getElementById('userid').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            try {
                const res = await fetch('https://example2606242.onrender.com/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userid, password })
                });

                const data = await res.json();
                resultDiv.textContent = data.message;
                resultDiv.className = 'result ' + (data.message === '로그인 성공' ? 'success' : 'error');
            } catch (e) {
                resultDiv.textContent = '서버에 연결할 수 없습니다.';
                resultDiv.className = 'result error';
            }
        }
    </script>
</body>
</html>
