document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle=\"height:100%; border-radius:999px; background:#6c8fd6; width:{{ progressPct }}; transition:width .4s cubic-bezier(.4,0,.2,1);\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Card -->\n    <div style=\"perspective:1600px; height:360px;\">\n      <div onclick=\"{{ flip }}\" style=\"{{ cardInnerStyle }}\">\n\n        <!-- Front -->\n        <div style=\"position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:24px; background:#ffffff; box-shadow:0 18px 40px -18px rgba(44,58,82,.28); border:1px solid #dde6f5; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:36px; cursor:pointer;\">\n          <button onclick=\"{{ speakWord }}\" title=\"발음 듣기\" style=\"position:absolute; top:18px; right:18px; width:42px; height:42px; border-radius:50%; border:1px solid #dde6f5; background:#f4f7fd; color:#5a6b88; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;\">🔊<\u002Fbutton>\n          <div style=\"width:140px; height:140px; flex:none; border-radius:50%; background:#eef3fc; border:1px solid #dde6f5; display:flex; align-items:center; justify-content:center; font-size:76px; line-height:1;\">{{ card.emoji }}<\u002Fdiv>\n          <div style=\"font-family:'Libre Franklin',sans-serif; font-weight:700; font-size:56px; color:#2c3a52; letter-spacing:-0.02em; text-align:center; line-height:1;\">{{ card.word }}<\u002Fdiv>\n          <span style=\"font-size:13px; color:#aab8d2;\">tap to flip<\u002Fspan>\n        <\u002Fdiv>\n\n        <!-- Back -->\n        <div style=\"position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; transform:rotateY(180deg); border-radius:24px; background:#41598a; color:#eef3fc; box-shadow:0 18px 40px -18px rgba(44,58,82,.5); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:40px; text-align:center; cursor:pointer;\">\n          <span style=\"font-size:22px; font-family:'Libre Franklin',sans-serif; color:#a9c2ee;\">{{ card.ipa }}<\u002Fspan>\n          <div style=\"font-size:32px; font-weight:600; letter-spacing:-0.01em;\">{{ card.translation }}<\u002Fdiv>\n          <div style=\"width:36px; height:1px; background:rgba(238,243,252,.25);\"><\u002Fdiv>\n          <p style=\"margin:0; font-size:17px; line-height:1.5; color:#cdd8ee; max-width:360px;\">{{ card.example }}<\u002Fp>\n          <button onclick=\"{{ speakExample }}\" style=\"margin-top:2px; display:inline-flex; align-items:center; gap:8px; padding:8px 16px; border-radius:999px; border:1px solid rgba(238,243,252,.3); background:rgba(238,243,252,.1); color:#eef3fc; font-size:14px; font-weight:600; cursor:pointer; font-family:'IBM Plex Sans',sans-serif;\">🔊 예문 듣기<\u002Fbutton>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Controls -->\n    <div style=\"display:flex; align-items:center; gap:12px;\">\n      <button onclick=\"{{ prev }}\" style=\"flex:none; width:52px; height:52px; border-radius:14px; border:1px solid #cdd8ee; background:#f4f7fd; color:#5a6b88; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;\">‹<\u002Fbutton>\n\n      <button onclick=\"{{ toggleKnown }}\" style=\"{{ knownBtnStyle }}\">{{ knownLabel }}<\u002Fbutton>\n\n      <button onclick=\"{{ next }}\" style=\"flex:none; width:52px; height:52px; border-radius:14px; border:1px solid #cdd8ee; background:#f4f7fd; color:#5a6b88; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;\">›<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Dots -->\n    <div style=\"display:flex; gap:8px; justify-content:center; flex-wrap:wrap;\">\n      <sc-for list=\"{{ dots }}\" as=\"dot\" hint-placeholder-count=\"10\">\n        <button onclick=\"{{ dot.go }}\" title=\"{{ dot.word }}\" style=\"{{ dot.style }}\"><\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { index: 0, flipped: false, known: {} };\n\n  cards = [\n    { word: \"Cat\",      emoji: \"🐱\", ipa: \"/kæt/\",        translation: \"고양이\", example: \"The cat is sleeping on the warm windowsill.\" },\n    { word: \"Dog\",      emoji: \"🐶\", ipa: \"/dɔːɡ/\",       translation: \"개\",     example: \"My dog loves to run in the park every morning.\" },\n    { word: \"Elephant\", emoji: \"🐘\", ipa: \"/ˈel.ɪ.fənt/\", translation: \"코끼리\", example: \"An elephant uses its trunk to drink water.\" },\n    { word: \"Lion\",     emoji: \"🦁\", ipa: \"/ˈlaɪ.ən/\",    translation: \"사자\",   example: \"The lion is known as the king of the jungle.\" },\n    { word: \"Tiger\",    emoji: \"🐯\", ipa: \"/ˈtaɪ.ɡər/\",   translation: \"호랑이\", example: \"A tiger has bright orange fur with black stripes.\" },\n    { word: \"Rabbit\",   emoji: \"🐰\", ipa: \"/ˈræb.ɪt/\",    translation: \"토끼\",   example: \"The rabbit hopped quickly across the green field.\" },\n    { word: \"Bear\",     emoji: \"🐻\", ipa: \"/ber/\",        translation: \"곰\",     example: \"A brown bear catches fish in the cold river.\" },\n    { word: \"Fox\",      emoji: \"🦊\", ipa: \"/fɒks/\",       translation: \"여우\",   example: \"The clever fox hid behind the old oak tree.\" },\n    { word: \"Wolf\",     emoji: \"🐺\", ipa: \"/wʊlf/\",       translation: \"늑대\",   example: \"The grey wolf howls at the full moon at night.\" },\n    { word: \"Penguin\",  emoji: \"🐧\", ipa: \"/ˈpeŋ.ɡwɪn/\",  translation: \"펭귄\",   example: \"A penguin slides on the ice to move faster.\" },\n  ];\n\n  speak = (text, rate) => {\n    try {\n      window.speechSynthesis.cancel();\n      const u = new SpeechSynthesisUtterance(text);\n      u.lang = \"en-US\";\n      u.rate = rate || 1;\n      window.speechSynthesis.speak(u);\n    } catch (e) {}\n  };\n  speakWord = (e) => { if (e) e.stopPropagation(); this.speak(this.cards[this.state.index].word); };\n  speakExample = (e) => { if (e) e.stopPropagation(); this.speak(this.cards[this.state.index].example, 0.95); };\n\n  flip = () => this.setState(s => ({ flipped: !s.flipped }));\n\n  goTo = (i) => {\n    const n = this.cards.length;\n    const idx = ((i % n) + n) % n;\n    this.setState({ index: idx, flipped: false });\n  };\n\n  next = (e) => { if (e) e.stopPropagation(); this.goTo(this.state.index + 1); };\n  prev = (e) => { if (e) e.stopPropagation(); this.goTo(this.state.index - 1); };\n\n  toggleKnown = (e) => {\n    if (e) e.stopPropagation();\n    const i = this.state.index;\n    this.setState(s => {\n      const known = { ...s.known };\n      if (known[i]) delete known[i]; else known[i] = true;\n      return { known };\n    });\n  };\n\n  componentDidMount() {\n    this._onKey = (e) => {\n      if (e.key === \"ArrowRight\") this.next();\n      else if (e.key === \"ArrowLeft\") this.prev();\n      else if (e.key === \" \" || e.key === \"Enter\") { e.preventDefault(); this.flip(); }\n      else if (e.key.toLowerCase() === \"k\") this.toggleKnown();\n    };\n    window.addEventListener(\"keydown\", this._onKey);\n  }\n  componentWillUnmount() {\n    window.removeEventListener(\"keydown\", this._onKey);\n  }\n\n  renderVals() {\n    const total = this.cards.length;\n    const index = this.state.index;\n    const card = this.cards[index];\n    const known = this.state.known;\n    const knownCount = Object.keys(known).length;\n    const isKnown = !!known[index];\n\n    const cardInnerStyle = [\n      \"position:relative\",\n      \"width:100%\",\n      \"height:100%\",\n      \"cursor:pointer\",\n      \"transform-style:preserve-3d\",\n      \"transition:transform .6s cubic-bezier(.4,0,.2,1)\",\n      \"transform:rotateY(\" + (this.state.flipped ? \"180deg\" : \"0deg\") + \")\",\n    ].join(\";\");\n\n    const knownBtnStyle = [\n      \"flex:1\",\n      \"height:52px\",\n      \"border-radius:14px\",\n      \"font-family:'IBM Plex Sans',sans-serif\",\n      \"font-size:15px\",\n      \"font-weight:600\",\n      \"cursor:pointer\",\n      \"transition:all .2s ease\",\n      \"display:flex\",\n      \"align-items:center\",\n      \"justify-content:center\",\n      \"gap:8px\",\n      isKnown ? \"border:1px solid #5a93b8\" : \"border:1px solid #cdd8ee\",\n      isKnown ? \"background:#5a93b8\" : \"background:#f4f7fd\",\n      isKnown ? \"color:#ffffff\" : \"color:#5a6b88\",\n    ].join(\";\");\n\n    const dots = this.cards.map((c, i) => {\n      const active = i === index;\n      const dk = !!known[i];\n      const bg = active ? \"#6c8fd6\" : (dk ? \"#5a93b8\" : \"#c6d3ea\");\n      return {\n        word: c.word,\n        go: (e) => { if (e) e.stopPropagation(); this.goTo(i); },\n        style: [\n          \"flex:none\",\n          \"width:\" + (active ? \"22px\" : \"10px\"),\n          \"height:10px\",\n          \"padding:0\",\n          \"border:none\",\n          \"border-radius:999px\",\n          \"cursor:pointer\",\n          \"transition:all .25s ease\",\n          \"background:\" + bg,\n        ].join(\";\"),\n      };\n    });\n\n    return {\n      total,\n      humanIndex: index + 1,\n      knownCount,\n      progressPct: Math.round(((index + 1) / total) * 100) + \"%\",\n      card,\n      flip: this.flip,\n      next: this.next,\n      prev: this.prev,\n      toggleKnown: this.toggleKnown,\n      knownLabel: isKnown ? \"✓ Learned\" : \"Mark as learned\",\n      cardInnerStyle,\n      knownBtnStyle,\n      dots,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
